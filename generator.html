<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PortfolioForge — Portfolio Generator</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="logo">🚀 PortfolioForge</a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="saved-ind" style="font-size:0.78rem;color:#64748b;"></span>
    <a href="index.html" style="color:#94a3b8;font-size:0.88rem;text-decoration:none;">← Back</a>
  </div>
</nav>

<!-- GENERATOR LAYOUT -->
<div class="gen-page">

  <!-- ── FORM PANEL ── -->
  <div class="fpanel">
    <div class="fpanel-head">
      <h2>Portfolio Generator</h2>
      <p id="step-label">Step 1 of 5 — Personal Info</p>
    </div>
    <div class="steps-bar" id="steps-bar">
      <div class="sdot active" id="sd-0"></div>
      <div class="sdot" id="sd-1"></div>
      <div class="sdot" id="sd-2"></div>
      <div class="sdot" id="sd-3"></div>
      <div class="sdot" id="sd-4"></div>
    </div>
    <div class="fcontent" id="fcontent"><!-- Injected by JS --></div>
    <div class="ffooter">
      <button class="fback" id="fbk" onclick="prevStep()" style="display:none;">← Back</button>
      <button class="fnext" id="fnxt" onclick="nextStep()">Continue →</button>
    </div>
  </div>

  <!-- ── PREVIEW PANEL ── -->
  <div class="ppanel">
    <div class="ptoolbar">
      <h3>🌐 Live Preview</h3>
      <div class="toolbar-r">
        <div class="tswitcher">
          <button class="tbtn active" id="th-dark"  onclick="switchTheme('dark')">Dark</button>
          <button class="tbtn"        id="th-light" onclick="switchTheme('light')">Light</button>
          <button class="tbtn"        id="th-gradient" onclick="switchTheme('gradient')">Gradient</button>
        </div>
        <button class="copy-btn" id="copy-html-btn" onclick="copyHTML()">📋 Copy HTML</button>
      </div>
    </div>
    <div class="pframe">
      <iframe id="portfolio-preview" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>

</div>

<script src="js/themes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
